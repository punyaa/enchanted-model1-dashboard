# Copy this file to .streamlit/secrets.toml locally or configure the same
# values in Streamlit Community Cloud secrets.

# Keep this false for local prototype hospital-ID login.
# Set to true only after your hospital OAuth/OIDC provider is configured.
OAUTH_ENABLED = false

# Keep this false in normal use so only authorised hospital IDs can enter.
OAUTH_ALLOW_UNKNOWN_USERS = false

# Streamlit OAuth/OIDC settings depend on your hospital identity provider.
# Add the provider-specific [auth] values here when available.
# Example shape only:
#
# [auth]
# redirect_uri = "https://your-streamlit-app.streamlit.app/oauth2callback"
# cookie_secret = "replace-with-a-long-random-string"
# client_id = "replace-with-hospital-oauth-client-id"
# client_secret = "replace-with-hospital-oauth-client-secret"
# server_metadata_url = "https://hospital-idp.example.com/.well-known/openid-configuration"
